<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Upgrade Process</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <link href="./style.css" rel="stylesheet">
    </head>
    <body>
        <section class="container">
            <div id="card-done" class="card-done" style="display: none;">
                <div class="text-center">
                    <img src="./images/bigsuccess.svg" alt="bigsucess" />
                </div>
                <div class="text-center card-title">
                    <span>Your Software Upgrade successfully !</span>
                </div>
                <div class="text-center go-to-home">
                    <button onclick="gotohome()">Go to Home</button>
                </div>
            </div>
            <div id="card" class="card" style="display: none;">
                <div class="first-section">
                    <div class="header-text">
                        Please Hold On. Do not refresh the page as we complete the update process.
                    </div>
                </div>
                <div class="second-section flex">
                    <div class="left-wrapper">
                        <div id="badge-box-1" class="badge active flex jcb">
                            Backup existing project
                            <span id="inprogress-1" class="mt-10" style="display: none;"><img src="./images/inprogress.gif" alt="inprogress-1" width="30" /> </span>
                            <span id="done-1" class="mt-10" style="display: none;"><img src="./images/smallsucess.svg" alt="done-1" /> </span>
                            <span id="error-1" class="mt-10" style="display: none;"><img src="./images/smallerror.svg" alt="error-1" /> </span>
                        </div>
                        <div id="badge-box-2" class="badge active flex jcb opacity-6">
                            Update app with latest version
                            <span id="inprogress-2" class="mt-10" style="display: none;"><img src="./images/inprogress.gif" alt="inprogress-2" width="30" /> </span>
                            <span id="done-2" class="mt-10" style="display: none;"><img src="./images/smallsucess.svg" alt="done-2" /> </span>
                            <span id="error-2" class="mt-10" style="display: none;"><img src="./images/smallerror.svg" alt="error-2" /> </span>
                        </div>
                        <div id="badge-box-3" class="badge active flex jcb opacity-6">
                            Generate Build
                            <span id="inprogress-3" class="mt-10" style="display: none;"><img src="./images/inprogress.gif" alt="inprogress-3" width="30" /> </span>
                            <span id="done-3" class="mt-10" style="display: none;"><img src="./images/smallsucess.svg" alt="done-3" /> </span>
                            <span id="error-3" class="mt-10" style="display: none;"><img src="./images/smallerror.svg" alt="error-3" /> </span>
                        </div>
                        <div id="badge-box-4" class="badge active flex jcb opacity-6">
                            DB Migration
                            <span id="inprogress-4" class="mt-10" style="display: none;"><img src="./images/inprogress.gif" alt="inprogress-4" width="30" /> </span>
                            <span id="done-4" class="mt-10" style="display: none;"><img src="./images/smallsucess.svg" alt="done-4" /> </span>
                            <span id="error-4" class="mt-10" style="display: none;"><img src="./images/smallerror.svg" alt="error-4" /> </span>
                        </div>
                        <div id="badge-box-5" class="badge active flex jcb opacity-6">
                            Verifying updates
                            <span id="inprogress-5" class="mt-10" style="display: none;"><img src="./images/inprogress.gif" alt="inprogress-5" width="30" /> </span>
                            <span id="done-5" class="mt-10" style="display: none;"><img src="./images/smallsucess.svg" alt="done-5" /> </span>
                            <span id="error-5" class="mt-10" style="display: none;"><img src="./images/smallerror.svg" alt="error-5" /> </span>
                        </div>
                    </div>
                    <div class="editor-wrapper">
                        <p id="editor" class="editor style-scroll">
                            <span>Activity logs</span>
                        </p>
                        <div class="downloadLog-wrapper" id="download_log">
                            <button class="btn">
                                <a id="dynamic-link" class="download-link" download>
                                    Download Log file
                                </a>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
            function gotohome() {
                window.location.href = window.location.origin;
            }
            // let version = "";
            async function getVersion() {
                const response = await fetch(window.location);
                const version = response.headers.get('x-app-version');
                const versionData = response.headers.get('x-app-version-data');
                return {version, versionData: JSON.parse(versionData)};
            }

            const editor = document.getElementById('editor');
            // APPEND EVENT LOGS
            function appendLog(newData) {
                if(editor) {
                    editor.innerHTML += newData;
                }
                editor.scrollTo({top: editor.scrollHeight, behavior: "smooth"})
            }

            async function check(event) {
                let step = 0;
                document.getElementById("inprogress-"+1).style.display = "inline-block";
                const stepArray = [1, 2, 3, 4, 5];
                const evId = `ev_${Math.random().toString(16).slice(2)}`;

                // Read Log Process
                const finalVersionData = await getVersion();
                const realLogSource = new EventSource(`/api/v1/realLog/events/read-log-${finalVersionData.version}`);
                realLogSource.onmessage = function(event) {
                    // Parse the event data (the progress update)
                    const data = JSON.parse(event.data)?.data;
                    if (data.step && data.step === 100) {
                        realLogSource.close();
                        appendLog(`<span>\nDone</span>`)
                        return;
                    }

                    let message = `<span style="white-space: pre">\n${data.message}</span>`;
                    if (data.message.indexOf("error:") !== -1) {
                        message = `<span style="white-space: pre" class="error-text">\n${data.message}</span>`;
                    }
                    appendLog(message);
                };
                realLogSource.onerror = function(error) {
                    console.error("Event error", error);
                    realLogSource.close(); // Close the connection in case of error
                };

                // Step Process
                const source = new EventSource(`/api/v1/upgradeProcess/events/${evId}`);
                source.onmessage = function(event) {
                    // Parse the event data (the progress update)
                    const data = JSON.parse(event.data)?.data;
                    if (data?.step && data?.step !== 100) {
                        step += 1;
                        document.getElementById("inprogress-"+stepArray[data?.step-1]).style.display = "none";
                        document.getElementById("done-"+stepArray[data?.step-1]).style.display = "inline-block";
                        document.getElementById("inprogress-"+stepArray[data?.step]).style.display = "inline-block";
                        document.getElementById("badge-box-"+stepArray[data?.step]).style.opacity = 1;
                    } else {
                        source.close();
                        if (data?.error) {
                            document.getElementById("inprogress-"+stepArray[step]).style.display = "none";
                            document.getElementById("error-"+stepArray[step]).style.display = "inline-block";
                            document.getElementById("badge-box-"+stepArray[step]).style.opacity = 1;
                            document.getElementById("download_log").style.display = "block";
                            const link = document.getElementById('dynamic-link');
                            const url = "../update-"+ finalVersionData.version + ".log"; // Replace with your dynamic URL
                            link.href = url;
                            // Error Message
                            return;
                        }
                        const indexStep = data?.step === 100 ? stepArray.length-1 : data?.step;
                        document.getElementById("inprogress-"+stepArray[indexStep]).style.display = "none";
                        document.getElementById("done-"+stepArray[indexStep]).style.display = "inline-block";
                        document.getElementById("badge-box-"+stepArray[indexStep]).style.opacity = 1;
                        document.getElementById("card").style.display = "none";
                        document.getElementById("card-done").style.display = "block";
                        setTimeout(() => {
                            window.location.href = window.location.origin;
                        }, 5000);
                    }
                };
                source.onerror = function(error) {
                    document.getElementById("inprogress-"+stepArray[step]).style.display = "none";
                    document.getElementById("error-"+stepArray[step]).style.display = "inline-block";
                    document.getElementById("badge-box-"+stepArray[step]).style.opacity = 1;
                    source.close(); // Close the connection in case of error
                };
                const url = "/api/v1/finalupgradeprocess";
                const data = {
                    'eventId' : evId,
                    versionData: finalVersionData.versionData
                };
                const other_params = {
                    headers : { "content-type" : "application/json" },
                    body : JSON.stringify(data),
                    method : "POST",
                    mode : "cors"
                };

                fetch(url, other_params)
                .then(function(response) {
                    if (response.ok) {
                        console.info("API response", response.json());
                    } else {
                        console.info("Could not reach the API: " + response.statusText);
                    }
                }).then(function(data) {
                    console.info("data.encoded: " + data);
                }).catch(function(error) {
                    console.info("error.message", error.message);
                });
            }
            setTimeout(async () => {
                document.getElementById("card-done").style.display = "none";
                document.getElementById("card").style.display = "block";
                setTimeout(() => {
                        check();
                }, 1000);
            }, 1000);
        </script>
    </body>
</html>

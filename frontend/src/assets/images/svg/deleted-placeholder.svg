<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280" role="img" aria-labelledby="phTitle phDesc">
  <title id="phTitle">Screenshot removed</title>
  <desc id="phDesc">A placeholder indicating the screenshot was deleted</desc>

  <!-- background -->
  <rect width="100%" height="100%" rx="12" fill="#f4f6f8"/>

  <!-- dashed inner frame -->
  <rect x="28" y="30" width="344" height="220" rx="8" fill="none" stroke="#d7dde3" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- simple mountain & sun -->
  <g transform="translate(76,58)" fill="none" stroke="#9aa6b2" stroke-width="2">
    <polyline points="0,130 60,50 120,130" stroke-linejoin="round"/>
    <circle cx="150" cy="30" r="12" fill="#e6eef6" stroke="#9aa6b2"/>
  </g>

  <!-- trash / cross badge -->
  <g transform="translate(260,40)">
    <rect x="-6" y="-6" width="80" height="56" rx="6" fill="#fff" stroke="#f0a2a2"/>
    <line x1="0" y1="0" x2="68" y2="56" stroke="#f05a5a" stroke-width="5" stroke-linecap="round"/>
    <line x1="68" y1="0" x2="0" y2="56" stroke="#f05a5a" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- label -->
  <text x="200" y="220" font-family="Segoe UI, Roboto, Arial" font-size="16" fill="#6b7785" text-anchor="middle">
    Screenshot deleted
  </text>
</svg>
